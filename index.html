<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLUTCH | SYSTEM_INIT</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #fff; font-family: 'Courier New', Courier, monospace; 
            overflow: hidden;
        }
        
        .background {
            position: fixed; width: 100vw; height: 100vh;
            background: url('background.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        .container { 
            position: relative; z-index: 3; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; /* Centered layout */
            height: 100vh;
        }

        /* This wrapper handles the distance from the logo */
        .audit-box {
            margin-top: 180px; /* Adjust this number to move it closer/further from logo */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .terminal-text { 
            font-weight: bold; letter-spacing: 4px; 
            margin-bottom: 10px; font-size: 1.3rem; 
            color: #000; 
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
        
        .input-line {
            background: rgba(255,255,255,0.95); border: none; 
            border-bottom: 3px solid #000; color: #000; 
            font-size: 1.2rem; text-align: center;
            width: 80%; max-width: 300px; outline: none;
            text-transform: uppercase; padding: 12px 0;
            border-radius: 0;
        }

        button { 
            background: #000; color: #fff; border: none; 
            padding: 18px 0; margin-top: 20px; 
            font-weight: bold; cursor: pointer; letter-spacing: 5px;
            width: 80%; max-width: 300px;
            text-transform: uppercase;
        }

        /* MOBILE FIX: Move it UP so the keyboard doesn't hide it */
        @media (max-width: 768px) {
            .container { justify-content: flex-start; padding-top: 20vh; }
            .audit-box { margin-top: 100px; } /* Closer to logo on small screens */
            .terminal-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <div class="audit-box">
            <div id="status" class="terminal-text">ENTER_ID_</div>
            
            <form id="clutchForm" action="https://docs.google.com/forms/d/e/YOUR_FORM_ID/formResponse" method="POST" target="hidden_iframe">
                <input type="email" name="entry.123456" class="input-line" placeholder="..." required>
                <br>
                <button type="submit">CLUTCH</button>
            </form>
        </div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {showSuccess();}"></iframe>

    <script>
        var submitted = false;
        const form = document.getElementById('clutchForm');
        const statusText = document.getElementById('status');

        form.onsubmit = function() {
            submitted = true;
        };

        function showSuccess() {
            form.style.display = 'none';
            statusText.innerHTML = "ID_ACCEPTED";
            statusText.style.color = "#000";
        }
    </script>

</body>
</html>
