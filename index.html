<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLUTCH | SYSTEM_INIT</title>
    <style>
        /* THE VAULT - PITCH BLACK */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; color: #fff;
        }
        
        /* YOUR LOGO - CENTERED */
        .background {
            position: fixed; width: 100vw; height: 100vh;
            background: url('background.jpg') no-repeat center center;
            background-size: 60%; /* Adjust this % to make logo bigger or smaller */
            z-index: 1;
        }

        .container { 
            position: relative; z-index: 3; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            height: 100vh;
        }

        /* AUDIT BOX - SITTING RIGHT BELOW LOGO */
        .audit-box {
            margin-top: 220px; /* Adjust this to move the input closer to the logo */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .terminal-text { 
            font-weight: bold; letter-spacing: 6px; 
            margin-bottom: 15px; font-size: 1.4rem; 
            color: #fff; 
        }
        
        .input-line {
            background: transparent; border: none; 
            border-bottom: 2px solid #fff; color: #fff; 
            font-size: 1.2rem; text-align: center;
            width: 80%; max-width: 300px; outline: none;
            text-transform: uppercase; padding: 12px 0;
            border-radius: 0;
        }

        button { 
            background: #fff; color: #000; border: none; 
            padding: 18px 0; margin-top: 25px; 
            font-weight: bold; cursor: pointer; letter-spacing: 5px;
            width: 80%; max-width: 300px;
            text-transform: uppercase;
        }

        /* MOBILE OPTIMIZATION - PREVENTS KEYBOARD COVERAGE */
        @media (max-width: 768px) {
            .container { justify-content: flex-start; padding-top: 15vh; }
            .background { background-size: 80%; } /* Makes logo bigger on phones */
            .audit-box { margin-top: 140px; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <div class="audit-box">
            <div id="status" class="terminal-text">ENTER_ID</div>
            
            <form id="clutchForm" action="https://docs.google.com/forms/d/e/YOUR_FORM_ID/formResponse" method="POST" target="hidden_iframe">
                <input type="email" name="entry.123456" class="input-line" placeholder="..." required>
                <br>
                <button type="submit">CLUTCH</button>
            </form>
        </div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {showSuccess();}"></iframe>

    <script>
        var submitted = false;
        const form = document.getElementById('clutchForm');
        const statusText = document.getElementById('status');

        form.onsubmit = function() {
            submitted = true;
        };

        function showSuccess() {
            form.style.display = 'none';
            statusText.innerHTML = "ID_ACCEPTED";
            statusText.style.color = "#fff";
        }
    </script>

</body>
</html>
